name: Terraform Plan & Approve & Apply

on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-auto.yml"
      - "terraform.tfvars"

  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
      - ".github/workflows/terraform-auto.yml"
      - "terraform.tfvars"

env:
  AWS_REGION: ap-south-1
  TF_VERSION: 1.5.0

jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest

    outputs:
      planfile: ${{ steps.plan.outputs.planfile }}

    permissions:
      contents: read
      pull-requests: write

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Terraform Init
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      # Terraform Format Check
      - name: Terraform Format Check
        working-directory: ./terraform
        run: terraform fmt -check -recursive
        continue-on-error: true

      # Terraform Validate
      - name: Terraform Validate
        working-directory: ./terraform
        run: terraform validate

      # Terraform Plan + Save output for PR comment
      - name: Terraform Plan
        id: plan
        working-directory: ./terraform
        run: |
          terraform plan -no-color -out=tfplan | tee plan-output.txt
          echo "planfile=tfplan" >> $GITHUB_OUTPUT

      # Upload binary plan file for apply job
      - name: Upload Terraform Plan Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan
          retention-days: 7

      # Upload readable plan output for PR comment
      - name: Upload Plan Output
        uses: actions/upload-artifact@v4
        with:
          name: plan-output
          path: terraform/plan-output.txt
          retention-days: 7

      # Comment plan on Pull Request
      - name: Comment Terraform Plan on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require("fs");
            const plan = fs.readFileSync("terraform/plan-output.txt", "utf8");

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 📋 Terraform Plan\`\`\`terraform${plan}\`\`\``
            });

  approve:
    name: Manual Approval
    runs-on: ubuntu-latest
    needs: plan

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    environment:
      name: production

    steps:
      - name: Approval Confirmation
        run: echo "Deployment approved for production."

  apply:
    name: Terraform Apply
    runs-on: ubuntu-latest
    needs:
      - plan
      - approve

    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read

    steps:
      # Checkout repository
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # Download saved plan file
      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan
          path: terraform/

      # Terraform Init again (new runner)
      - name: Terraform Init
        working-directory: ./terraform
        run: terraform init

      # Apply exact reviewed plan
      - name: Terraform Apply
        working-directory: ./terraform
        run: terraform apply -no-color tfplan

      # Show Terraform Outputs
      - name: Terraform Outputs
        working-directory: ./terraform
        run: terraform output
